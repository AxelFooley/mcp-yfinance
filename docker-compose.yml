services:
  yfinance-mcp:
    image: axelfooley/yfinance-mcp-server:latest
    # Uncomment to build locally instead:
    # build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request, sys
          req = urllib.request.Request(
            "http://localhost:8000/mcp",
            data=b'{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"healthcheck","version":"1.0"}}}',
            headers={"Content-Type": "application/json", "Accept": "application/json, text/event-stream"},
          )
          try:
            urllib.request.urlopen(req, timeout=5)
            sys.exit(0)
          except Exception:
            sys.exit(1)
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
